back continuo y entregas parciales para que veas el avance real."},{category:"Proyecto",question:"¿También mejoran o amplían software existente?",answer:"Sí. Trabajamos tanto con proyectos nuevos como con sistemas existentes que necesitan evolucionar. Ya sea integrar tu software con otros servicios, agregar nuevos módulos, modernizar tecnología legacy o mejorar el rendimiento, podemos ayudarte sin tener que empezar de cero."},{category:"Proyecto",question:"¿Qué tecnologías usan?",answer:"Trabajamos con un stack moderno y probado: React, Next.js, TypeScript y React Native para frontend y mobile; Node.js, Python y FastAPI para backend; PostgreSQL, MongoDB y Supabase para datos; AWS, Vercel y Docker para deploy. Para ciberseguridad usamos herramientas como Wazuh, Fail2Ban y prácticas de hardening estándar de la industria. Elegimos la tecnología en función de tu proyecto, no al revés."},{category:"Pagos",question:"¿Cómo se cobra el proyecto?",answer:"Trabajamos con un esquema simple y transparente en 3 partes: 25% al inicio para arrancar de inmediato, 50% al llegar a la mitad del proyecto (cuando ya viste avances concretos), y 25% final contra la entrega y conformidad total del producto. Sin sorpresas, sin costos ocultos.",highlight:"25% / 50% / 25%"},{category:"Soporte",question:"¿Qué pasa después del lanzamiento?",answer:"No desaparecemos cuando entregamos. Todos nuestros servicios incluyen 3 meses de soporte y mantenimiento gratuitos post-lanzamiento que cubren correcciones, ajustes menores, monitoreo y consultas técnicas. Después podés contratar planes mensuales de mantenimiento evolutivo según las necesidades de tu producto.",highlight:"3 meses gratis"},{category:"Soporte",question:"¿Ofrecen mantenimiento y evolución?",answer:"Sí, ofrecemos planes de soporte continuo que incluyen corrección de bugs, actualizaciones de seguridad, mejoras de rendimiento, nuevas funcionalidades y monitoreo proactivo. Te acompañamos a lo largo del ciclo de vida completo de tu software, no solo en el lanzamiento."},{category:"Seguridad",question:"¿Cómo manejan la seguridad de los datos?",answer:"La seguridad es parte de nuestro ADN, no un agregado. Trabajamos sobre infraestructura cloud-grade con cifrado en tránsito (TLS 1.3) y en reposo (AES-256), autenticación robusta con JWT/OAuth, control de accesos basado en roles (RBAC), backups automáticos diarios y logs de auditoría. Aplicamos mejores prácticas OWASP en cada línea de código y todas nuestras bases de datos cumplen con estándares internacionales de protección.",highlight:"Cifrado AES-256 + TLS 1.3"},{category:"Seguridad",question:"¿Firman acuerdo de confidencialidad (NDA)?",answer:"Por supuesto. Antes de iniciar cualquier proyecto firmamos un acuerdo de confidencialidad (NDA) revisado por nuestro asesor legal interno. Tu idea, tu información comercial, tus datos y todo lo que compartas con nosotros queda protegido legalmente. Tu propiedad intelectual es 100% tuya.",highlight:"NDA con respaldo legal"},{category:"Internacional",question:"¿Trabajan con clientes de distintos países?",answer:"Sí, trabajamos con clientes en LATAM, Estados Unidos y Europa. Nos adaptamos al mercado donde opere tu proyecto: idioma, zona horaria, regulaciones locales, pasarelas de pago regionales y cualquier requerimiento del entorno. Nuestra experiencia internacional nos permite operar en contextos diversos con total fluidez."},{category:"Internacional",question:"¿Pueden adaptar el software a requisitos legales o administrativos?",answer:"Absolutamente. Parte de nuestro diferencial es la adaptación a requerimientos legales, administrativos y operativos de cada mercado. Contemplamos facturación electrónica (AFIP, SII, SAT, etc.), normativas de protección de datos (GDPR, LGPD, Ley 25.326), regulaciones sectoriales y cualquier marco legal que aplique a tu negocio o industria."}];function og({faq:o,index:p,isOpen:m,onToggle:u}){const{ref:v,isVisible:y}=$e(.1),S=Ur[o.category],z=M=>{const f=M.currentTarget.getBoundingClie
